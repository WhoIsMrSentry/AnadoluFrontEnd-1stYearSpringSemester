<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Uygulama — Responsive Profil Sayfası</title>

  <style>
    /* DOKUNMAYINIZ — Temel sıfırlama */
    * {
      box-sizing: border-box;
    }

    body {
      font-family: sans-serif;
      margin: 0;
      padding: 0;
    }

    /* =============================================
       VERİLEN STILLER — Bunları değiştirmeyin
       ============================================= */

    body {
      background-color: #f0f0f0;
      padding: 20px;
    }

    .profil-karti {
      background-color: white;
      border-radius: 10px;
      padding: 30px;
      display: flex;
      gap: 30px;
      align-items: center;
      margin-bottom: 30px;
    }

    .profil-foto {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background-color: steelblue;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
    }

    .profil-bilgi h1 {
      font-size: 28px;
      margin: 0 0 5px 0;
    }

    .profil-bilgi p {
      font-size: 16px;
      color: #666;
      margin: 0 0 15px 0;
    }

    .etiketler {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .etiket {
      background-color: steelblue;
      color: white;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 14px;
    }

    nav ul {
      display: flex;
      list-style: none;
      margin: 0;
      padding: 15px;
      background-color: #333;
      gap: 20px;
    }

    nav ul li a {
      color: white;
      text-decoration: none;
      font-size: 16px;
    }

    .projeler {
      display: flex;
      gap: 20px;
      margin-top: 20px;
    }

    .proje-karti {
      background-color: white;
      border-radius: 10px;
      padding: 20px;
      flex: 1;
    }

    .proje-karti h3 {
      margin: 0 0 10px 0;
      font-size: 18px;
    }

    .proje-karti p {
      margin: 0;
      color: #666;
      font-size: 14px;
    }

    @media (max-width: 600px) {

      .profil-karti {
        flex-direction: column;
        text-align: center;
      }

      nav ul {
        flex-direction: column;
      }

      .projeler {
        flex-direction: column;
      }

    }

    @media (max-width: 601px) and (max-width: 900px) {
      body {
        background-color: #e8f0fe;
      }

      .projeler {
        flex-wrap: wrap;
      }

      .proje-karti {
        width: 45%;
      }
    }

    /* =============================================
       BONUS GÖREV — Mobile-First ile yeniden yazın
       Yukarıdaki iki @media kuralını silip
       tüm CSS'i mobile-first yaklaşımıyla,
       yani min-width kullanarak yeniden yazın.
       ============================================= */
  </style>
</head>

<body>

  <nav>
    <ul>
      <li><a href="#">Profil</a></li>
      <li><a href="#">Projeler</a></li>
      <li><a href="#">İletişim</a></li>
    </ul>
  </nav>

  <!-- Profil Kartı -->
  <div class="profil-karti">
    <div class="profil-foto">👤</div>
    <div class="profil-bilgi">
      <h1>Emir Hamurcu</h1>
      <p>Backend Geliştirici · Hatay</p>
      <div class="etiketler">
        <span class="etiket">Python</span>
        <span class="etiket">C/C++</span>
        <span class="etiket">C#</span>
      </div>
    </div>
  </div>

  <!-- Proje Kartları -->
  <div class="projeler">
    <div class="proje-karti">
      <h3>Proje 1</h3>
      <p>Kısa bir açıklama buraya gelecek.</p>
    </div>
    <div class="proje-karti">
      <h3>Proje 2</h3>
      <p>Kısa bir açıklama buraya gelecek.</p>
    </div>
    <div class="proje-karti">
      <h3>Proje 3</h3>
      <p>Kısa bir açıklama buraya gelecek.</p>
    </div>
  </div>

</body>

</html>
