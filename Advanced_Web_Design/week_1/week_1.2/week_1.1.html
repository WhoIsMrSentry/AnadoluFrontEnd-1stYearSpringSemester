<!DOCTYPE html>
<html lang="tr">
<head>
        <meta charset="UTF-8">
        <!--
                Açıklama (Türkçe):
                - Bu dosya grid özelliklerinin notlarını ve kısa örneklerini içerir.
                - `fr`, `auto`, `repeat`, `minmax` gibi sık kullanılan grid terimlerinin
                    ne anlama geldiğini CSS içinde örneklerle gösteriyoruz.
                - Yeni başlayanlar için ipucu: sütun/satır ölçülerini karıştırarak
                    (ör. px + fr + auto) esnek ve sabit düzenler oluşturabilirsiniz.
                - Buradaki amaç: grid kurallarını deneyerek farklı düzenleri öğrenmenizdir.
        -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        /* `.kapsayici` örnek grid konteyneridir; burada sık kullanılan
           grid özellikleri notlar halinde gösterilmiştir. */
        .kapsayici{
            display: grid;

            /* grid-template-columns notları:
               - fr: oransal alan. 1fr 2fr => ikinci sütun birincinin 2 katı genişlikte.
               - auto: sütun içeriği kadar yer kaplar (içerik küçülürse daralır).
               - % veya px: sabit genişlik (örn. 50% veya 200px).
               - repeat(n, value): tekrar eder (örn. repeat(3, 1fr) => 3 eşit sütun).
               - minmax(min, max): minimum ve maksimum sınır (örn. minmax(100px, 1fr)).
               - fit-content(max): içeriğe göre, maksimum genişlik sınırı (örn. fit-content(200px)).
               Örnek kombinasyonlar:
               grid-template-columns: 1fr 2fr 50% 25%;
               grid-template-columns: repeat(3, 1fr) 200px;
               grid-template-columns: auto minmax(150px, 2fr) fit-content(180px);
            */

            /* grid-template-rows notları:
               - fr: oransal alan. 1fr 2fr => ikinci satır birincinin 2 katı yüksekliğe sahip olur.
               - auto: satır içeriği kadar yer kaplar (içerik küçülürse daralır).
               - % veya px: sabit yükseklik (örn. 50% veya 200px).
               - repeat(n, value): tekrar eder (örn. repeat(3, 1fr) => 3 eşit satır).
               - minmax(min, max): minimum ve maksimum sınır (örn. minmax(100px, 1fr)).
               Örnek kombinasyonlar:
               grid-template-rows: 1fr 2fr 50% 25%;
               grid-template-rows: repeat(3, 1fr) 200px;
               grid-template-rows: auto minmax(150px, 2fr);
            */

            /* Örnek: 3 adet 150px genişliğinde sütun ve 2 adet esnek satır */
            grid-template-columns: repeat(3, 150px);
            grid-template-rows: repeat(2, 1fr);

            gap: 20px;
            /* grid-row-gap: 50px;
            grid-column-gap: 100px;
            grid-gap: 100px 200px; */
        }

        /* Tek bir grid öğesi nasıl belirli sütunlara yayılır gösterimi */
        .item{
            background-color:aqua;
            padding: 30px;
            /* Aşağıdaki örnekler aynı işi yapar: */
            /* grid-column-start: 2; grid-column-end: 3; */

            grid-column: 1/3; /* bu öğe 1. sütundan başlayıp 3. sütuna kadar uzanır */
        }

        /* `item2` örneği: geniş bir öğe oluşturmak için sütunları birleştirir */
        .item2{
            background-color:coral;
            padding: 30px;
            /* grid-column-end değeri örnek amaçlı büyük verilmiş; gerçek projede
               toplam sütun sayısına göre ayarlayın (aşırı değerler otomatik uyum sağlar). */
            grid-column-start: 1;
            grid-column-end: 6;
                
        }
    </style>
</head>
<body>
    <div class="kapsayici">
        <div class="item">1</div>
        <div class="item2">2</div>
        <div class="item">3</div>
        <div class="item2">4</div>
        <div class="item">5</div>
        <div class="item2">6</div>
        <div class="item">7</div>
        <div class="item2">8</div>
        <div class="item">9</div>
        <div class="item2">10</div>
    </div>
</body>
</html>
