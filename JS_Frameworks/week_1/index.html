<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./styles.css">
    <!-- styles.css kaldırıldı; basit örnek için stil dosyası gerekli değil -->
</head>
<body>
    <main>
        <h1 id="title">DOM Demo</h1>
        <p class="description">Use the input and buttons below to interact with the DOM.</p>

        <div class="controls">
            <input id="itemInput" placeholder="Type item here">
            <button id="addBtn">Add Item</button>
            <button id="clearBtn">Clear Items</button>
        </div>

        <ul id="itemsList"></ul>
        <div id="log" aria-live="polite"></div>
    </main>

    <script src="./scripts.js"></script>
</body>
</html>
